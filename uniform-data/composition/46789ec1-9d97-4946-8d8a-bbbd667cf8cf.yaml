                            type: text
                            style: ''
                            detail: 0
                            format: 1
                            version: 1
                          - mode: normal
                            text: ' No shortcuts. No gimmicks. Only the stuff we trust on real trails, granite, and snow.'
                            type: text
                            style: ''
