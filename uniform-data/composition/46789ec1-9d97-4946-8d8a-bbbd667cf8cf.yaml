                            type: text
                            style: ''
                            detail: 0
                            format: 1
                            version: 1
                          - mode: normal
                            text: ' From choosing your first pack to finding a tent that can actually fit two and a dog, we share what works—and what doesn''t.'
                            type: text
                            style: ''
                            detail: 0
                            format: 0
                            version: 1
