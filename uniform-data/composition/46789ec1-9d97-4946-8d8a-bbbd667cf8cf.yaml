                            text: 'Welcoming Community:'
                            type: text
                            style: ''
                            detail: 0
                            format: 1
                            version: 1
                          - mode: normal
                            text: ' Everyone’s invited. All experience levels. All budgets. If you want to be outside, you belong here.'
                            type: text
                            style: ''
                            detail: 0
                            format: 0
                            version: 1
                        direction: null
