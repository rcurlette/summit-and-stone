                    children:
                      - mode: normal
                        text: >-
                          Welcome to Summit & Stone, where "Climb Without
                          Compromise" isn't just a tagline—it's our everyday.
                          You're here because you love the outdoors. So do we.
                          Whether you’re chasing your first summit, dialing in
                          gear for a thru-hike, or just need a jacket that
                          laughs at rain, we’ve tested every product so all you
                          need to do is get out there and explore.
                        type: text
                        style: ''
                        detail: 0
                        format: 0
                        version: 1
